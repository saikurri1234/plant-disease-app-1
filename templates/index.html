<!DOCTYPE html>
<html>
<head>
    <title>Plant Disease Detection 🌿</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1d976c, #93f9b9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: white;
            color: black;
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 20px 0;
        }

        button {
            padding: 12px 25px;
            background: #1d976c;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #148f5c;
        }

        #loading {
            display: none;
            margin-top: 15px;
            color: #1d976c;
            font-weight: bold;
        }
    </style>

    <script>
        function showLoading() {
            document.getElementById("loading").style.display = "block";
        }
    </script>

</head>

<body>

<div class="card">
    <h1>🌿 Plant Disease Detection</h1>

    <form action="/predict" method="post" enctype="multipart/form-data" onsubmit="showLoading()">
        <input type="file" name="file" required>
        <br>
        <button type="submit">🔍 Predict</button>
    </form>

    <div id="loading">
        ⏳ Analyzing image...
    </div>
</div>

</body>
</html>

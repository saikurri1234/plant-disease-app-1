<!DOCTYPE html>
<html>
<head>
    <title>Plant Disease Detection 🌿</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(to right, #56ab2f, #a8e063);
            color: white;
        }

        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
            margin-top: 100px;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #loading {
            display: none;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>

    <script>
        function showLoading() {
            document.getElementById("loading").style.display = "block";
        }
    </script>

</head>

<body>

<div class="card">
    <h1>🌿 Plant Disease Detection</h1>

    <form action="/predict" method="post" enctype="multipart/form-data" onsubmit="showLoading()">
        <input type="file" name="file" required>
        <br><br>
        <button type="submit">Predict</button>
    </form>

    <div id="loading">
        ⏳ Analyzing image... Please wait
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Result 🌿</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1d976c, #93f9b9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        img {
            width: 250px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .confidence {
            margin-top: 10px;
            font-weight: bold;
            color: green;
        }

        .info {
            margin-top: 15px;
            font-size: 14px;
            color: #444;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: #1d976c;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
        }

        a:hover {
            background: #148f5c;
        }
    </style>

</head>

<body>

<div class="card">
    <h2>🌿 Prediction Result</h2>

    <img src="/uploads/{{ filename }}">

    <h3>{{ prediction }}</h3>

    <div class="confidence">
        Confidence: {{ confidence }}%
    </div>

    <div class="info">
        {{ info }}
    </div>

    <a href="/">🔄 Try Another Image</a>
</div>

</body>
</html>

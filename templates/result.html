<!DOCTYPE html>
<html>
<head>
    <title>Result 🌿</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #56ab2f, #a8e063);
            text-align: center;
            color: white;
        }

        .card {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
            margin-top: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        img {
            width: 220px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .confidence {
            margin-top: 10px;
            font-weight: bold;
            color: green;
        }

        .info {
            margin-top: 15px;
            font-size: 14px;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            background: green;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🌿 Prediction Result</h2>

    <img src="/uploads/{{ filename }}">

    <h3>{{ prediction }}</h3>

    <div class="confidence">
        Confidence: {{ confidence }}%
    </div>

    <div class="info">
        {{ info }}
    </div>

    <a href="/">Try Another Image</a>
</div>

</body>
</html>
